<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>炸雞點餐系統</title>
    <style>
        body { 
            font-family: '微軟正黑體', sans-serif; 
            margin: 0; padding: 40px 20px;
            background: linear-gradient(180deg, #ff9944 0%, #ffffff 100%); 
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }
        .order-form { 
            width: 100%; max-width: 450px; 
            background: rgba(255, 255, 255, 0.95); 
            padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); 
        }
        h2 { text-align: center; color: #d35400; margin-bottom: 20px; }
        .form-group { margin-bottom: 18px; }
        label { font-weight: bold; color: #555; display: block; margin-bottom: 8px; }
        select, input, textarea { 
            width: 100%; padding: 12px; border: 2px solid #ffe0cc; 
            border-radius: 10px; box-sizing: border-box; font-size: 16px;
        }
        .preview-container { margin-top: 15px; text-align: center; }
        .preview-img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 10px; display: none; }
        button { 
            width: 100%; padding: 15px; background: #e67e22; color: white; 
            border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer;
        }
        button:hover { background: #d35400; }
    </style>
</head>
<body>

<div class="order-form">
    <h2>🍗 炸雞點餐系統</h2>
    
    <div class="form-group">
        <label for="seatNumber">座號：</label>
        <input type="text" id="seatNumber" placeholder="請輸入您的座號">
    </div>

    <div class="form-group">
        <label for="itemSelect">選擇美味炸物：</label>
        <select id="itemSelect" onchange="updatePreview()">
            <option value="" data-img="">-- 請選擇品項 --</option>
            <option value="雞肉串(腿)" data-img="https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=500">雞肉串(腿)</option>
            <option value="雞肉串(排)" data-img="https://images.unsplash.com/photo-1598103442097-8b74394b95c6?w=500">雞肉串(排)</option>
            <option value="米血" data-img="https://images.unsplash.com/photo-1599487488170-d11e9c2343a9?w=500">米血</option>
            <option value="薯餅" data-img="https://images.unsplash.com/photo-1605336066160-58933391216d?w=500">薯餅</option>
            <option value="百頁" data-img="https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=500">百頁</option>
            <option value="熱狗" data-img="https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=500">熱狗</option>
            <option value="雞皮" data-img="https://images.unsplash.com/photo-1562967914-608f82629710?w=500">雞皮</option>
            <option value="花枝丸" data-img="https://images.unsplash.com/photo-1579613832111-ac7dfcc7725f?w=500">花枝丸</option>
            <option value="黑輪片" data-img="https://images.unsplash.com/photo-1541592106381-b31e967320e1?w=500">黑輪片</option>
            <option value="銀絲卷" data-img="https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=500">銀絲卷</option>
        </select>
        <div class="preview-container">
            <img id="itemPreview" class="preview-img" src="" alt="預覽圖">
        </div>
    </div>

    <div class="form-group">
        <label for="quantity">數量：</label>
        <input type="number" id="quantity" min="1" value="1">
    </div>

    <div class="form-group">
        <label for="note">備註：</label>
        <textarea id="note" rows="2" placeholder="例如：加辣、不要胡椒"></textarea>
    </div>

    <button onclick="submitOrder()">立即送出訂單</button>
</div>

<script>
    // 【重要】請在此處填入你 Google Apps Script 的網址
    const GAS_WEB_APP_URL = "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE";

    function updatePreview() {
        const select = document.getElementById('itemSelect');
        const selectedOption = select.options[select.selectedIndex];
        const imgUrl = selectedOption.getAttribute('data-img');
        const previewImg = document.getElementById('itemPreview');
        previewImg.src = imgUrl;
        previewImg.style.display = imgUrl ? 'block' : 'none';
    }

    function submitOrder() {
        const seatNumber = document.getElementById('seatNumber').value;
        const item = document.getElementById('itemSelect').value;
        const quantity = document.getElementById('quantity').value;
        const note = document.getElementById('note').value;

        if (!seatNumber || !item) { alert('請填寫座號並選擇餐點！'); return; }

        fetch(GAS_WEB_APP_URL, {
            method: 'POST',
            body: JSON.stringify({ seatNumber, item, quantity, note })
        })
        .then(res => res.json())
        .then(data => {
            alert('🎉 訂單已送達！');
            document.getElementById('seatNumber').value = '';
            document.getElementById('itemSelect').value = '';
            document.getElementById('quantity').value = 1;
            document.getElementById('note').value = '';
            updatePreview();
        })
        .catch(err => alert('發生錯誤，請確認網址！'));
    }
</script>
</body>
</html>
